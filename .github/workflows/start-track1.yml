name: "SQL Warehouse Serverless"

on:
  workflow_dispatch:
    inputs:
      participant_name:
        description: "Seu nome (ex: Joao Silva). Opcional — se não informado, será usado o owner do repositório."
        required: false
        type: string

permissions:
  issues: write
  contents: read

jobs:
  start-training:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Criar Issue e labels
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const participantName = '${{ github.event.inputs.participant_name }}' || context.repo.owner;
            const track = 'track-1-full';
            const trackLabel = 'track-1-full';
            const stepLabel = 't1-step-01';

            const labelsToCreate = [
              { name: 'databricks-training',    color: 'e4e669', description: 'Treinamento Databricks + Copilot' },
              { name: trackLabel,               color: 'd93f0b', description: 'Trilha: SQL Warehouse Serverless' },
              { name: 't1-step-01',             color: 'fb8500', description: 'T1 Etapa 1: Setup + Bronze SQL' },
              { name: 't1-step-02',             color: 'fb8500', description: 'T1 Etapa 2: Silver ETL' },
              { name: 't1-step-03',             color: 'fb8500', description: 'T1 Etapa 3: Gold SQL' },
              { name: 't1-step-04',             color: '0e8a16', description: 'T1 Concluído!' },
            ];

            for (const label of labelsToCreate) {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label.name,
                color: label.color,
                description: label.description,
              }).catch(() => {});
            }

            const stepContent = fs.readFileSync('.github/training/steps/track1/step-01.md', 'utf8');
            const body = [
              `## Treinamento Databricks + Copilot: SQL Serverless Free`,
              ``,
              `**Participante:** @${participantName}`,
              `**Trilha:** SQL Warehouse Serverless (2X-Small) - Extracao -> Limpeza -> ETL Gold (4 etapas)`,
              `**Iniciado por:** @${context.actor}`,
              ``,
              `---`,
              ``,
              stepContent,
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Treinamento Databricks [SQL Serverless Free] - ${participantName}`,
              body,
              labels: ['databricks-training', trackLabel, stepLabel],
            });

            console.log(`Issue criada: #${issue.data.number} - ${issue.data.html_url}`);
            core.setOutput('issue_url', issue.data.html_url);

      - name: Resumo
        run: |
          echo "## SQL Serverless Free iniciada" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Participante:** ${{ github.event.inputs.participant_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Acesse a issue criada para iniciar a **Etapa 1: Setup e Extracao**." >> $GITHUB_STEP_SUMMARY
